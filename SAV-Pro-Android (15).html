<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2563EB" id="theme-meta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SAV Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --acc:#2563EB;--acc-d:#1D4ED8;--acc-l:#EFF6FF;
  --rd:#EF4444;--rdl:#FEF2F2;--rdm:#FECACA;
  --gn:#10B981;--gnl:#D1FAE5;
  --am:#F59E0B;
  --g0:#F8FAFC;--g1:#F1F5F9;--g2:#E2E8F0;
  --g4:#94A3B8;--g6:#64748B;--g8:#334155;--g9:#0F172A;
  --bg:#F0F4F8;
  --card:#fff;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sh:0 1px 4px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,system-ui,sans-serif;color:var(--g9);display:flex;flex-direction:column;background:var(--bg);}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}

/* ── AUTH SCREENS ── */
#auth{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;overflow-y:auto;}
#auth.hidden{display:none;}
.auth-bg{background:linear-gradient(160deg,#1E40AF 0%,var(--acc) 55%,#0EA5E9 100%);}
.auth-top{padding:calc(44px + var(--st)) 22px 32px;flex-shrink:0;}
.auth-body{background:var(--card);border-radius:28px 28px 0 0;flex:1;padding:28px 18px calc(28px + var(--sb));min-height:55vh;}
.pb{width:100%;display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:16px;border:1.5px solid var(--g2);background:var(--card);margin-bottom:10px;text-align:left;box-shadow:var(--sh);}
.pb:active{transform:scale(.98);}
.pb.first{border-color:#BFDBFE;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);}
.av-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;overflow:hidden;flex-shrink:0;}
.auth-inp{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--g2);font-size:16px;color:var(--g9);background:var(--g0);outline:none;-webkit-appearance:none;transition:border-color .15s;}
.auth-inp:focus{border-color:var(--acc);background:#fff;}
.auth-err{display:none;background:var(--rdl);border:1px solid var(--rdm);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--rd);margin-bottom:10px;}
.auth-btn{width:100%;padding:14px;border-radius:12px;background:var(--acc);color:#fff;border:none;font-size:16px;font-weight:700;transition:background .15s;}
.auth-btn:active{background:var(--acc-d);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%;}
#app.show{display:flex;}
#topbar{
  background:linear-gradient(135deg,#1E40AF,var(--acc));
  padding:calc(var(--st) + 11px) 16px 11px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.tb-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em;flex:1;}
.tb-r{display:flex;align-items:center;gap:9px;}
.tb-av{border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;background:rgba(255,255,255,.2);cursor:pointer;flex-shrink:0;}
.bell{position:relative;background:rgba(255,255,255,.15);border:none;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;}
#bell-dot{position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:#EF4444;border:2px solid #1E40AF;display:none;}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
.view{display:none;padding:15px 14px 14px;}
.view.on{display:block;}

/* ── NAV ── */
#nav{background:var(--card);border-top:1px solid rgba(0,0,0,.06);display:flex;padding-bottom:var(--sb);flex-shrink:0;height:calc(60px + var(--sb));box-shadow:0 -2px 16px rgba(0,0,0,.07);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--g4);font-size:10px;min-height:54px;}
.nb.on{color:var(--acc);}
.nb svg{opacity:.45;}.nb.on svg{opacity:1;}
.nb.on span{font-weight:700;}
.fab-w{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;}
.fab{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;border:none;box-shadow:0 6px 20px rgba(37,99,235,.4);transform:translateY(-12px);}
.fab:active{transform:translateY(-12px) scale(.95);}
.fab-l{font-size:10px;color:var(--acc);font-weight:700;margin-top:-4px;}
.nb-dot{position:relative;}
.nb-dot::after{content:'';position:absolute;top:1px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--rd);border:2px solid var(--card);display:none;}
.nb-dot.has::after{display:block;}

/* ── TICKETS ── */
.tc{background:var(--card);border-radius:16px;padding:14px 14px 13px 18px;margin-bottom:11px;position:relative;overflow:hidden;box-shadow:var(--sh);}
.tc:active{transform:scale(.99);}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:16px 0 0 16px;}
.tc.urgent::before{background:linear-gradient(180deg,#EF4444,#DC2626);}
.tc.high::before{background:linear-gradient(180deg,#F97316,#EA580C);}
.tc.medium::before{background:linear-gradient(180deg,#F59E0B,#D97706);}
.tc.low::before{background:var(--g2);}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.bdg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.prio{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;border:1.5px solid var(--g2);background:var(--card);color:var(--g8);}
.btn:active{transform:scale(.97);}
.btn-p{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-p:active{background:var(--acc-d);}
.btn-d{background:var(--rdl);color:var(--rd);border-color:var(--rdm);}
.btn-full{width:100%;padding:12px;font-size:14px;margin-top:8px;}

/* ── FILTERS ── */
.fpills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.fpill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--g2);background:var(--card);color:var(--g6);font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.fpill.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700;}

/* ── OVERLAYS ── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-end;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
.ov.on{display:flex;}
.sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 17px calc(26px + var(--sb));width:100%;max-height:93vh;overflow-y:auto;}
.mid-ov{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(3px);padding:20px;}
.mid-ov.on{display:flex;}
.modal{background:var(--card);border-radius:20px;padding:22px 18px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;}

/* ── FIELDS ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--g6);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid var(--g2);font-size:15px;color:var(--g9);background:var(--g0);outline:none;-webkit-appearance:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);background:#fff;}
.field textarea{resize:none;min-height:78px;}

/* ── PHOTOS ── */
.ph-strip{display:flex;gap:9px;overflow-x:auto;padding:3px 0;}
.ph-w{position:relative;flex-shrink:0;}
.ph-img{width:72px;height:72px;border-radius:12px;object-fit:cover;box-shadow:var(--sh);}
.ph-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:var(--rd);border:2.5px solid var(--card);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;padding:0;}
.ph-add{width:72px;height:72px;border-radius:12px;border:2px dashed var(--g2);background:var(--g0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--g4);font-size:10px;flex-shrink:0;}

/* ── TIMELINE ── */
.tl{display:flex;gap:10px;padding-bottom:14px;position:relative;}
.tl-line{position:absolute;left:14px;top:30px;width:2px;bottom:0;background:var(--g1);}
.tl-dot{width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}

/* ── STATUS GRID ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sb2{border-radius:12px;padding:11px 6px;text-align:center;border:1.5px solid var(--g2);background:var(--g0);}
.sb2:active{transform:scale(.97);}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;}
.kpi{background:var(--card);border-radius:16px;padding:15px;box-shadow:var(--sh);}
.kpi:active{transform:scale(.98);}

/* ── ADMIN ── */
.acard{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--sh);}
.atitle{font-size:13px;font-weight:800;color:var(--g9);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--g1);}
.ainp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--g2);font-size:14px;color:var(--g9);background:var(--g0);outline:none;-webkit-appearance:none;margin-bottom:4px;}
.ainp:focus{border-color:var(--acc);}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(76px + var(--sb));left:50%;transform:translateX(-50%) translateY(6px);background:#0F172A;color:#fff;border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .2s;z-index:9999;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── THEME SWATCHES ── */
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0;}
.swatch.sel{border-color:var(--g9);transform:scale(1.15);}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth" class="auth-bg">
  <!-- Profile list -->
  <div id="auth-profiles" style="display:flex;flex-direction:column;flex:1;">
    <div class="auth-top">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <div id="auth-company" style="font-size:21px;font-weight:900;color:#fff;letter-spacing:-.03em;">SAV Pro</div>
          <div style="font-size:11px;color:rgba(255,255,255,.6);">GESTION DES INTERVENTIONS</div>
        </div>
      </div>
      <h1 style="font-size:28px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-.04em;">Vos interventions<br>sous controle</h1>
    </div>
    <div class="auth-body">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="width:34px;height:4px;border-radius:2px;background:var(--acc);"></div>
        <p style="font-size:16px;font-weight:900;color:var(--g9);">Choisissez votre profil</p>
      </div>
      <p style="font-size:12px;color:var(--g4);margin-bottom:16px;">Appuyez sur votre nom</p>
      <div id="profile-btns"></div>
    </div>
  </div>

  <!-- Password create -->
  <div id="auth-create-pw" style="display:none;flex-direction:column;flex:1;">
    <div class="auth-top" style="padding-bottom:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div id="cp-av" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;background:rgba(255,255,255,.2);color:#fff;overflow:hidden;"></div>
        <div>
          <div id="cp-name" style="font-size:20px;font-weight:800;color:#fff;"></div>
          <div style="font-size:12px;color:rgba(255,255,255,.65);">Premiere connexion</div>
        </div>
      </div>
      <h2 style="font-size:24px;font-weight:800;color:#fff;line-height:1.2;">Creez votre<br>mot de passe</h2>
      <p style="font-size:13px;color:rgba(255,255,255,.65);margin-top:8px;">Votre espace personnel et prive.</p>
    </div>
    <div class="auth-body">
      <div style="margin-bottom:14px;"><label style="font-size:11px;font-weight:700;color:var(--g6);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Mot de passe</label><input id="cp-pw1" class="auth-inp" type="password" placeholder="Choisissez un mot de passe"/></div>
      <div style="margin-bottom:10px;"><label style="font-size:11px;font-weight:700;color:var(--g6);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Confirmer</label><input id="cp-pw2" class="auth-inp" type="password" placeholder="Repetez le mot de passe"/></div>
      <div id="cp-err" class="auth-err"></div>
      <button onclick="doCreatePw()" class="auth-btn">Creer mon espace</button>
      <button onclick="showProfiles()" style="display:block;width:100%;margin-top:12px;background:none;border:none;font-size:13px;color:var(--g4);padding:6px;">Retour</button>
    </div>
  </div>

  <!-- Password enter -->
  <div id="auth-enter-pw" style="display:none;flex-direction:column;flex:1;">
    <div class="auth-top" style="padding-bottom:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div id="ep-av" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;background:rgba(255,255,255,.2);color:#fff;overflow:hidden;"></div>
        <div>
          <div id="ep-name" style="font-size:20px;font-weight:800;color:#fff;"></div>
          <div style="font-size:12px;color:rgba(255,255,255,.65);">Espace prive</div>
        </div>
      </div>
      <h2 style="font-size:24px;font-weight:800;color:#fff;">Mot de passe</h2>
    </div>
    <div class="auth-body">
      <div style="margin-bottom:10px;"><input id="ep-pw" class="auth-inp" type="password" placeholder="Votre mot de passe" onkeydown="if(event.key==='Enter')doEnterPw()"/></div>
      <div id="ep-err" class="auth-err"></div>
      <button onclick="doEnterPw()" class="auth-btn">Se connecter</button>
      <button onclick="showProfiles()" style="display:block;width:100%;margin-top:12px;background:none;border:none;font-size:13px;color:var(--g4);padding:6px;">Retour</button>
      <button onclick="resetPwConfirm()" style="display:block;width:100%;margin-top:4px;background:none;border:none;font-size:12px;color:var(--g4);padding:6px;">Mot de passe oublie ?</button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div id="topbar">
    <div class="tb-name" id="tb-title">SAV Pro</div>
    <div class="tb-r">
      <button class="bell" onclick="goTo('notifs')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div id="bell-dot"></div>
      </button>
      <div id="tb-av" class="tb-av" style="width:32px;height:32px;" onclick="openProfile()"></div>
    </div>
  </div>

  <div id="main">
    <div class="view on" id="view-dashboard"></div>
    <div class="view" id="view-tickets"></div>
    <div class="view" id="view-notifs"></div>
    <div class="view" id="view-team"></div>
    <div class="view" id="view-admin"></div>
    <div class="view" id="view-board"></div>
  </div>

  <div id="nav">
    <button class="nb on" id="nb-dashboard" onclick="goTo('dashboard')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Accueil</span>
    </button>
    <button class="nb" id="nb-tickets" onclick="goTo('tickets')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Tickets</span>
    </button>
    <div class="fab-w">
      <button class="fab" onclick="openCreate()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <span class="fab-l">Nouveau</span>
    </div>
    <button class="nb nb-dot" id="nb-notifs" onclick="goTo('notifs')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Alertes</span>
    </button>
    <button class="nb" id="nb-team" onclick="goTo('team')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Equipe</span>
    </button>
    <button class="nb" id="nb-board" style="display:none;" onclick="goTo('board')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Tableau</span>
    </button>
    <button class="nb" id="nb-admin" style="display:none;" onclick="goTo('admin')">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>Admin</span>
    </button>
  </div>
</div>

<!-- Overlays -->
<div class="ov" id="ov-detail"><div class="sheet" id="sh-detail"></div></div>
<div class="ov" id="ov-create"><div class="sheet" id="sh-create"></div></div>
<div class="mid-ov" id="ov-del"><div class="modal" id="sh-del"></div></div>
<div class="mid-ov" id="ov-team-profile"><div class="modal" id="sh-team-profile"></div></div>
<div class="ov" id="ov-profile"><div class="sheet" id="sh-profile"></div></div>

<div id="lightbox" onclick="this.style.display='none'" style="position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:3000;"><img id="lb-img" src="" style="max-width:94vw;max-height:90vh;border-radius:10px;"/></div>
<input type="file" id="ph-gal" accept="image/*" style="display:none;">
<input type="file" id="ph-cam" accept="image/*" capture="camera" style="display:none;">
<input type="file" id="ph-avatar" accept="image/*" style="display:none;">
<div id="toast"></div>

<script>
/* ===== STATIC DATA ===== */
var DEFAULT_USERS = {
  admin:  {id:"admin",  name:"Richard Colineau",    role:"Gestionnaire", initials:"RC", hue:215},

function loadAll() {
  try {
    var d = localStorage.getItem("sav_v1");
    if (d) { var p = JSON.parse(d); T = p.tickets||[]; N = p.notifs||[]; }
  } catch(e) {}
  try {
    var c = localStorage.getItem("sav_cfg");
    if (c) {
      var cfg = JSON.parse(c);
      CFG.company = cfg.company || "SAV Pro";
      if (cfg.priorities) Object.keys(cfg.priorities).forEach(function(k){if(PC[k])PC[k].l=cfg.priorities[k];});
      if (cfg.statuses)   Object.keys(cfg.statuses).forEach(function(k){if(SC[k])SC[k].l=cfg.statuses[k];});
      if (cfg.techs && cfg.techs.length) {
        TECHS.length=0;
        cfg.techs.forEach(function(t){TECHS.push(t);USERS[t.id]=t;});
      }
    }
  } catch(e) {}
  try {
    var pr = localStorage.getItem("sav_profiles");
    if (pr) PROFILES = JSON.parse(pr);
  } catch(e) {}
  if (!T.length) T = defaultTickets();
  if (!N.length) N = defaultNotifs();
  cleanup24h();
}
function saveData() { try{localStorage.setItem("sav_v1",JSON.stringify({tickets:T,notifs:N}));}catch(e){} }
function saveCfg() {
  var prio={},stat={};
  Object.keys(PC).forEach(function(k){prio[k]=PC[k].l;});
  Object.keys(SC).forEach(function(k){stat[k]=SC[k].l;});
  try{localStorage.setItem("sav_cfg",JSON.stringify({company:CFG.company,priorities:prio,statuses:stat,techs:TECHS}));}catch(e){}
}
function saveProfiles() { try{localStorage.setItem("sav_profiles",JSON.stringify(PROFILES));}catch(e){} }
function getProfile(uid) {
  return PROFILES[uid] || {password:null,photo:null,themeIdx:0,bgImage:null};

/* 24h cleanup */
function cleanup24h() {
  var now24 = Date.now() - 86400000;
  T = T.filter(function(t) {
    if (t.status !== "done") return true;
    return t.doneAt && t.doneAt > now24;
  });
}

/* ===== UTILS ===== */
function now() { var d=new Date(); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
function tbg(h){return "hsl("+h+",55%,93%)";}
function tcl(h){return "hsl("+h+",60%,35%)";}
function bH(st){var c=SC[st]||SC.pending;return '<span class="bdg" style="background:'+c.bg+';color:'+c.fg+';border:1px solid '+c.ring+'"><span class="bdg-dot" style="background:'+c.dot+'"></span>'+c.l+'</span>';}
function pH(p){var c=PC[p]||PC.medium;return '<span class="prio" style="background:'+c.bg+';color:'+c.c+'">'+c.l+'</span>';}
function avCircle(uid, size, fontSize) {
  var u = USERS[uid]; if (!u) u = {initials:"?",hue:0};
  var pr = getProfile(uid);
  if (pr.photo) return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+tbg(u.hue)+';color:'+tcl(u.hue)+';font-size:'+fontSize+'px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+u.initials+'</div>';
}
function avH(tid, sn) {
  if (!tid) return sn?'<span style="font-size:11px;color:#94A3B8;font-style:italic;">Non assigne</span>':'';
  var u = USERS[tid]; if (!u) return '';
  return '<span style="display:inline-flex;align-items:center;gap:6px;">'+avCircle(tid,22,8)+(sn?'<span style="font-size:12px;color:#334155;">'+u.name+'</span>':'')+'</span>';
}
function bldTxt(ts) {
  return "SAV Pro - Rapport\n"+Array(38).join("-")+"\n\n"
    +ts.map(function(t){var u=t.tech?USERS[t.tech]:null;return "["+t.id+"] "+t.title+"\n  Client: "+t.client+(t.tel?" - "+t.tel:"")+"\n  Statut: "+SC[t.status].l+"\n  Priorite: "+PC[t.priority].l+"\n  Technicien: "+(u?u.name:"Non assigne")+"\n  Date: "+t.date+" "+t.heure;}).join("\n\n"+Array(38).join("-")+"\n\n");

/* ===== THEME ===== */
function applyTheme(uid) {
  var pr = getProfile(uid);
  var idx = pr.themeIdx || 0;
  var th = THEMES[idx] || THEMES[0];
  var isDark = idx === 4;
  document.documentElement.style.setProperty("--acc", th.acc);
  document.documentElement.style.setProperty("--acc-d", th.dark_acc);
  document.documentElement.style.setProperty("--acc-l", isDark?"#312E81":"#EFF6FF");
  document.documentElement.style.setProperty("--bg", pr.bgImage?"transparent":th.bg);
  document.documentElement.style.setProperty("--card", isDark?"#1E293B":"#fff");
  document.documentElement.style.setProperty("--g0", isDark?"#0F172A":"#F8FAFC");
  document.documentElement.style.setProperty("--g1", isDark?"#1E293B":"#F1F5F9");
  document.documentElement.style.setProperty("--g2", isDark?"#334155":"#E2E8F0");
  document.documentElement.style.setProperty("--g4", isDark?"#64748B":"#94A3B8");
  document.documentElement.style.setProperty("--g6", isDark?"#94A3B8":"#64748B");
  document.documentElement.style.setProperty("--g8", isDark?"#CBD5E1":"#334155");
  document.documentElement.style.setProperty("--g9", isDark?"#F1F5F9":"#0F172A");
  if (pr.bgImage) {
    document.getElementById("main").style.backgroundImage = "url("+pr.bgImage+")";
    document.getElementById("main").style.backgroundSize = "cover";
    document.getElementById("main").style.backgroundPosition = "center";
  } else {
    document.getElementById("main").style.backgroundImage = "";
    document.getElementById("main").style.background = "";
  }
  document.getElementById("theme-meta").content = th.acc;
}

/* ===== AUTH ===== */
function showProfiles() {
  document.getElementById("auth-profiles").style.display = "flex";
  document.getElementById("auth-create-pw").style.display = "none";
  document.getElementById("auth-enter-pw").style.display = "none";
  pendingAuthUid = null;
  buildProfileBtns();
}
function buildProfileBtns() {
  document.getElementById("auth-company").textContent = CFG.company || "SAV Pro";
  var allUsers = [{id:"admin",isAdmin:true}].concat(TECHS.map(function(t){return {id:t.id,isAdmin:false};}));
  var html = allUsers.map(function(u,i) {
    var usr = USERS[u.id]; if (!usr) return '';
    var pr = getProfile(u.id);
    var av = pr.photo
      ? '<div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/></div>'
      : '<div style="width:48px;height:48px;border-radius:50%;background:'+tbg(usr.hue)+';color:'+tcl(usr.hue)+';font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+usr.initials+'</div>';
    var cls = i===0 ? "pb first" : "pb";
    var nameCol = i===0 ? "color:var(--acc)" : "color:var(--g9)";
    var role = u.isAdmin ? "Gestionnaire" : "Technicien";
    var lockIco = pr.password ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--g4)" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"><path d="M8 11V7a4 4 0 0 1 8 0"/><rect x="3" y="11" width="18" height="11" rx="2"/></svg>';
    return '<button class="'+cls+'" onclick="tapProfile(\''+u.id+'\')">'+av+'<div style="flex:1;"><div style="font-size:15px;font-weight:700;'+nameCol+';">'+usr.name+'</div><div style="font-size:12px;color:var(--g4);">'+role+'</div></div>'+lockIco+'</button>';
  }).join("");
  document.getElementById("profile-btns").innerHTML = html;
}
function tapProfile(uid) {
  pendingAuthUid = uid;
  var pr = getProfile(uid);
  var usr = USERS[uid];
  if (!pr.password) {
    // First time - create password
    document.getElementById("auth-profiles").style.display = "none";
    document.getElementById("auth-create-pw").style.display = "flex";
    var cpAv = document.getElementById("cp-av");
    cpAv.innerHTML = pr.photo ? '<img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/>' : usr.initials;
    if (!pr.photo) { cpAv.style.background=tbg(usr.hue); cpAv.style.color=tcl(usr.hue); }
    document.getElementById("cp-name").textContent = usr.name;
    document.getElementById("cp-pw1").value="";
    document.getElementById("cp-pw2").value="";
    document.getElementById("cp-err").style.display="none";
    setTimeout(function(){document.getElementById("cp-pw1").focus();},300);
  } else {
    // Enter password
    document.getElementById("auth-profiles").style.display = "none";
    document.getElementById("auth-enter-pw").style.display = "flex";
    var epAv = document.getElementById("ep-av");
    epAv.innerHTML = pr.photo ? '<img src="'+pr.photo+'" style="width:100%;height:100%;object-fit:cover;"/>' : usr.initials;
    if (!pr.photo) { epAv.style.background=tbg(usr.hue); epAv.style.color=tcl(usr.hue); }
    document.getElementById("ep-name").textContent = usr.name;
    document.getElementById("ep-pw").value="";
    document.getElementById("ep-err").style.display="none";
    setTimeout(function(){document.getElementById("ep-pw").focus();},300);
  }
}
function doCreatePw() {
  var p1 = document.getElementById("cp-pw1").value;
  var p2 = document.getElementById("cp-pw2").value;
  var err = document.getElementById("cp-err");
  if (p1.length < 4) { err.textContent="Minimum 4 caracteres.";err.style.display="block";return; }
  if (p1 !== p2)     { err.textContent="Les mots de passe ne correspondent pas.";err.style.display="block";return; }
  err.style.display="none";
  if (!PROFILES[pendingAuthUid]) PROFILES[pendingAuthUid]={};
  PROFILES[pendingAuthUid].password = p1;
  saveProfiles();
  doLogin(pendingAuthUid);
}
function doEnterPw() {
  var pw = document.getElementById("ep-pw").value;
  var pr = getProfile(pendingAuthUid);
  var err = document.getElementById("ep-err");
  if (pw !== pr.password) { err.textContent="Mot de passe incorrect.";err.style.display="block";return; }
  err.style.display="none";
  doLogin(pendingAuthUid);
}
function resetPwConfirm() {
  if (confirm("Reinitialiser le mot de passe ? Vous devrez en creer un nouveau.")) {
    if (PROFILES[pendingAuthUid]) PROFILES[pendingAuthUid].password = null;
    saveProfiles();
    showProfiles();
    toast("Mot de passe reinitialise.");
  }
}
function doLogin(uid) {
  CU = USERS[uid];
  applyTheme(uid);
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.add("show");
  // Topbar avatar
  var pr = getProfile(uid);
  var tbAv = document.getElementById("tb-av");
  if (pr.photo) { tbAv.innerHTML='<img src="'+pr.photo+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;"/>'; }
  else { tbAv.textContent=CU.initials; }
  document.getElementById("tb-title").textContent = CFG.company || "SAV Pro";
  document.getElementById("nb-admin").style.display = CU.id==="admin"?"flex":"none";
  goTo("dashboard");updBadge();
  if(Notification&&Notification.permission==="default"){
    setTimeout(function(){
      Notification.requestPermission().then(function(p){
        if(p==="granted")toast("Notifications activees pour "+CU.name+" !");
      });
    },1500);
  }
}
function doLogout() {
  CU=null;
  document.getElementById("app").classList.remove("show");
  document.getElementById("auth").classList.remove("hidden");
  // Reset theme to default
  document.documentElement.style.cssText="";
  document.getElementById("main").style.backgroundImage="";
  showProfiles();
}

/* ===== NAV ===== */
function goToFiltered(v){fSt=v;goTo('tickets');}

  CV=v;

}

  var dateStr=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

function updateNotifBtn(){
  var btn=document.getElementById("notif-perm-btn");
  if(!btn)return;
  if(!("Notification" in window)){btn.textContent="Notifications non supportees";btn.disabled=true;return;}
  if(Notification.permission==="granted"){btn.textContent="Notifications activees";btn.style.background="var(--gnl)";btn.style.color="#065F46";btn.style.borderColor="var(--gn)";btn.disabled=true;}
  else if(Notification.permission==="denied"){btn.textContent="Notifications bloquees (modifier dans Chrome)";btn.style.color="var(--rd)";btn.disabled=true;}
  else{btn.textContent="Activer les notifications push";btn.style.background="var(--acc)";btn.style.color="#fff";btn.style.borderColor="var(--acc)";}
}

function askNotifPerm(){
  if(!("Notification" in window))return;
  Notification.requestPermission().then(function(p){
    if(p==="granted"){toast("Notifications activees !");}
    else{toast("Notifications refusees.");}
    updateNotifBtn();
  });
}

    +'<button style="flex:1;padding:9px 0;background:none;border:none;font-size:13px;font-weight:'+(tab==="info"?700:400)+';color:'+(tab==="info"?"var(--acc)":"var(--g4)")+';border-bottom:'+(tab==="info"?"2px solid var(--acc)":"2px solid transparent")+';margin-bottom:-1px;" onclick="renderDetail(T.find(function(x){return x.id===\''+t.id+'\';}),'+"'info'"+'">Details</button>'
    +'<button style="flex:1;padding:9px 0;background:none;border:none;font-size:13px;font-weight:'+(tab==="history"?700:400)+';color:'+(tab==="history"?"var(--acc)":"var(--g4)")+';border-bottom:'+(tab==="history"?"2px solid var(--acc)":"2px solid transparent")+';margin-bottom:-1px;" onclick="renderDetail(T.find(function(x){return x.id===\''+t.id+'\';}),'+"'history'"+'">Historique ('+(t.hist||[]).length+')</button></div>';
  var telLink=t.tel?'<a href="tel:'+t.tel+'" style="display:flex;align-items:center;gap:8px;font-size:15px;color:var(--acc);font-weight:700;margin-bottom:6px;padding:10px 12px;background:var(--acc-l);border-radius:11px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.38 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>Appeler '+t.tel+'</a>':'';
  var bodyInfo='<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;"><div><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Statut</p>'+bH(t.status)+'</div><div><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Priorite</p>'+pH(t.priority)+'</div></div>'
    +'<div style="margin-bottom:13px;"><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Description</p><div style="background:var(--g0);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--g8);line-height:1.65;">'+(t.desc||"Aucune description.")+'</div></div>'
    +'<div style="margin-bottom:13px;"><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Photos ('+(t.photos||[]).length+')</p><div class="ph-strip">'+photosH+'<button onclick="document.getElementById(\'ph-cam\').click();phTid=\''+t.id+'\';" class="ph-add"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Camera</button><button onclick="document.getElementById(\'ph-gal\').click();phTid=\''+t.id+'\';" class="ph-add"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galerie</button></div></div>'
    +(telLink||t.email?'<div style="margin-bottom:13px;"><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Contact client</p>'+telLink+(t.email?'<a href="mailto:'+t.email+'" style="font-size:13px;color:var(--acc);">'+t.email+'</a>':'')+'</div>':"")
    +'<div style="margin-bottom:13px;"><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Technicien assigne</p><select onchange="dtTech(\''+t.id+'\',this.value)" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--g2);font-size:14px;color:var(--g8);background:var(--card);-webkit-appearance:none;outline:none;"><option value="">- Non assigne -</option>'+techOpts+'</select></div>'
    +'<div><p style="font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Changer le statut</p><div class="sg">'+stBtns+'</div></div>';
  var bodyHist="";
  var hist=[].concat(t.hist||[]).reverse();
  if(!hist.length)bodyHist='<p style="text-align:center;color:var(--g4);font-size:13px;padding:16px 0;">Aucun historique.</p>';
  else hist.forEach(function(hh,i){var ic=HIC[hh.t]||HIC.create;bodyHist+='<div class="tl">'+(i<hist.length-1?'<div class="tl-line"></div>':'')+'<div class="tl-dot" style="background:'+ic.bg+';color:'+ic.fg+';">'+ic.s+'</div><div style="padding-top:3px;"><p style="font-size:13px;font-weight:500;margin-bottom:2px;">'+hh.l+'</p><p style="font-size:10px;color:var(--g4);">'+hh.h+'</p></div></div>';});
  document.getElementById("sh-detail").innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;">'
    +'<div style="flex:1;margin-right:9px;"><p style="font-size:10px;font-family:monospace;color:var(--g4);margin-bottom:3px;">'+t.id+' - '+t.date+' '+t.heure+'</p>'
    +'<h2 style="font-size:16px;font-weight:800;color:var(--g9);line-height:1.3;margin-bottom:2px;">'+t.title+'</h2>'
    +'<p style="font-size:12px;color:var(--g6);">'+t.client+'</p></div>'
    +'<div style="display:flex;gap:6px;flex-shrink:0;">'
    +'<button onclick="askDel(\''+t.id+'\',true)" class="btn btn-d" style="padding:7px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>'
    +'<button onclick="closeDetail()" style="width:32px;height:32px;border-radius:9px;border:none;background:var(--g1);color:var(--g6);display:flex;align-items:center;justify-content:center;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
    +'</div></div>'
    +'<div style="display:flex;gap:7px;margin-bottom:13px;">'
    +'<button onclick="dtCopy(\''+t.id+'\')" class="btn" style="flex:1;font-size:12px;padding:8px;">Copier</button>'
    +'<button onclick="dtMail(\''+t.id+'\')" class="btn" style="flex:1;font-size:12px;padding:8px;">Envoyer</button>'
    +'</div>'+tabBar+(tab==="info"?bodyInfo:bodyHist);
}
function dtSt(id,st){
  T=T.map(function(t){if(t.id!==id)return t;var e={h:now(),l:"Statut : "+SC[st].l,t:st==="done"?"done":"status"};var upd=Object.assign({},t,{status:st,hist:(t.hist||[]).concat([e])});if(st==="done")upd.doneAt=Date.now();return upd;});
  addNotif("status",id+" Statut : "+SC[st].l,(T.find(function(t){return t.id===id;})||{}).title||"");
  if(st==="done"){var tk=T.find(function(t){return t.id===id;});if(tk){var u=tk.tech?USERS[tk.tech]:null;var body="ARCHIVE SAV\n\nTicket : "+tk.id+"\nTitre : "+tk.title+"\nClient : "+tk.client+(tk.tel?" - "+tk.tel:"")+"\nDate : "+tk.date+" "+tk.heure+"\nCloture : "+now()+" par "+(u?u.name:"--");window.location.href="mailto:?subject="+encodeURIComponent("[ARCHIVE] "+tk.id)+"&body="+encodeURIComponent(body);}}
  saveData();var t=T.find(function(x){return x.id===id;});if(t)renderDetail(t,"info");if(CV==="tickets")renderTickets();if(CV==="dashboard")renderDash();
}
function dtTech(id,tid){
  var u=tid?USERS[tid]:null;
  T=T.map(function(t){if(t.id!==id)return t;var es=u?[{h:now(),l:"Assigne a "+u.name,t:"assign"}]:[];var ns=tid&&t.status==="pending"?"assigned":t.status;return Object.assign({},t,{tech:tid||null,status:ns,hist:(t.hist||[]).concat(es)});});
  if(u)addNotif("assign",id+" assigne a "+u.name,(T.find(function(t){return t.id===id;})||{}).title||"");
  saveData();var t=T.find(function(x){return x.id===id;});if(t)renderDetail(t,"info");if(CV==="tickets")renderTickets();
}
function dtCopy(id){var t=T.find(function(x){return x.id===id;});if(t){try{navigator.clipboard.writeText(bldTxt([t]));}catch(e){}toast("Copie !");}}
function dtMail(id){var t=T.find(function(x){return x.id===id;});if(t)window.location.href="mailto:?subject="+encodeURIComponent("SAV "+t.id)+"&body="+encodeURIComponent(bldTxt([t]));}
function dtDelPh(tid,pid){T=T.map(function(t){if(t.id!==tid)return t;return Object.assign({},t,{photos:(t.photos||[]).filter(function(p){return p.id!==pid;})});});saveData();toast("Photo supprimee.");var t=T.find(function(x){return x.id===tid;});if(t)renderDetail(t,"info");}

/* ===== PHOTOS ===== */
document.getElementById("ph-gal").onchange=function(ev){handlePh(ev);};
document.getElementById("ph-cam").onchange=function(ev){handlePh(ev);};
function handlePh(ev){
  var file=ev.target.files[0];if(!file||!phTid)return;
  var r=new FileReader();
  r.onload=function(e){
    T=T.map(function(t){if(t.id!==phTid)return t;var ps=(t.photos||[]).concat([{id:Date.now(),d:e.target.result,n:file.name}]);return Object.assign({},t,{photos:ps,hist:(t.hist||[]).concat([{h:now(),l:"Photo ajoutee",t:"photo"}])});});
    addNotif("photo",phTid+" photo ajoutee",(T.find(function(t){return t.id===phTid;})||{}).title||"");
    ev.target.value="";saveData();toast("Photo ajoutee !");
    var t=T.find(function(x){return x.id===phTid;});if(t)renderDetail(t,"info");if(CV==="tickets")renderTickets();
  };r.readAsDataURL(file);
}

/* ===== DELETE ===== */
function askDel(id,fd){
  var t=T.find(function(x){return x.id===id;});if(!t)return;
  delId=id;delFD=!!fd;
  document.getElementById("sh-del").innerHTML=
    '<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:18px;"><div style="width:44px;height:44px;border-radius:50%;background:var(--rdl);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--rd)" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></div>'
    +'<div><h3 style="font-size:15px;font-weight:800;color:var(--g9);margin-bottom:5px;">Supprimer ?</h3>'
    +'<p style="font-size:13px;color:var(--g6);line-height:1.6;"><strong>'+t.id+'</strong> sera definitivement supprime.</p></div></div>'
    +'<div style="display:flex;gap:9px;">'
    +'<button onclick="closeOv(\'ov-del\')" class="btn" style="flex:1;padding:12px;font-size:14px;">Annuler</button>'
    +'<button onclick="doDel()" class="btn btn-d" style="flex:1.5;padding:12px;font-size:14px;font-weight:700;">Supprimer</button></div>';
  document.getElementById("ov-del").classList.add("on");
}
function doDel(){var t=T.find(function(x){return x.id===delId;});addNotif("delete",delId+" supprime",t?t.title:"");T=T.filter(function(t){return t.id!==delId;});closeOv("ov-del");if(delFD)closeDetail();saveData();toast(delId+" supprime.");if(CV==="tickets")renderTickets();if(CV==="dashboard")renderDash();}

/* ===== CREATE ===== */
function openCreate(){
  var techOpts=TECHS.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join("");
  document.getElementById("sh-create").innerHTML=
    '<h2 style="font-size:18px;font-weight:800;color:var(--g9);margin-bottom:16px;">Nouveau ticket SAV</h2>'
    +'<div class="field"><label>Titre *</label><input id="cr-t" placeholder="Ex : Refrigerateur en panne"/></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">'
    +'<div class="field"><label>Client *</label><input id="cr-c"/></div>'
    +'<div class="field"><label>Telephone</label><input id="cr-tel" type="tel" placeholder="06 XX XX XX XX"/></div></div>'
    +'<div class="field"><label>Description</label><textarea id="cr-d" placeholder="Details du probleme..."></textarea></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">'
    +'<div class="field"><label>Priorite</label><select id="cr-p"><option value="low">'+PC.low.l+'</option><option value="medium" selected>'+PC.medium.l+'</option><option value="high">'+PC.high.l+'</option><option value="urgent">'+PC.urgent.l+'</option></select></div>'
    +'<div class="field"><label>Technicien</label><select id="cr-tech"><option value="">- Non assigne -</option>'+techOpts+'</select></div></div>'
    +'<div style="display:flex;gap:9px;margin-top:4px;">'
    +'<button onclick="closeOv(\'ov-create\')" class="btn" style="flex:1;padding:13px;font-size:15px;">Annuler</button>'
    +'<button onclick="doCreate()" class="btn btn-p" style="flex:2;padding:13px;font-size:15px;">Creer</button></div>';
  document.getElementById("ov-create").classList.add("on");
}
function doCreate(){
  var title=(document.getElementById("cr-t").value||"").trim();
  var client=(document.getElementById("cr-c").value||"").trim();
  if(!title||!client){toast("Titre et client obligatoires.");return;}
  var tel=(document.getElementById("cr-tel").value||"").trim();
  var techId=document.getElementById("cr-tech").value||null;
  var u=techId?USERS[techId]:null;
  var pri=document.getElementById("cr-p").value;
  var desc=(document.getElementById("cr-d").value||"").trim();
  var id="SAV-"+("00"+nid++).slice(-3);
  var h=now();var today=new Date().toLocaleDateString("fr-FR").slice(0,5);
  T.unshift({id:id,title:title,client:client,tel:tel,email:"",desc:desc,status:techId?"assigned":"pending",priority:pri,tech:techId,photos:[],date:today,heure:h,hist:[{h:h,l:"Ticket cree",t:"create"}].concat(u?[{h:h,l:"Assigne a "+u.name,t:"assign"}]:[])});
  addNotif("create",id+" cree "+PC[pri].l,title);
  closeOv("ov-create");saveData();toast(id+" cree !");goTo("dashboard");
}

/* ===== OVERLAYS ===== */
function closeOv(id){document.getElementById(id).classList.remove("on");}
["ov-detail","ov-create","ov-profile"].forEach(function(id){document.getElementById(id).addEventListener("click",function(e){if(e.target===this)closeOv(id);});});
["ov-del","ov-team-profile"].forEach(function(id){document.getElementById(id).addEventListener("click",function(e){if(e.target===this)closeOv(id);});});

/* ===== INIT ===== */
loadAll();showProfiles();
</script>
